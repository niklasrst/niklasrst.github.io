<h1>iTunes App Search 2</h1>
  <p><input type="text" id="query" /><select id="device"><option value="software" />iPhone</option><option value="iPadSoftware" />iPad</option></select><button>search</button><br><br /></p>
<hr />
<div id="results">
</div>
<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.3.2/jquery.min.js" type="text/javascript"></script>
<script type="text/javascript">
$(document).ready(function(){
var url='http://itunes.apple.com/search?callback=?&country=de&media=software';
var query;
var device;
  $('button').click(function(){
    $("#results").empty();
    query='&term='+$("#query").val();
  device='&entity='+$("#device").val();
    $.getJSON((url+device+query),function(json){
      $.each(json.results,function(i,j){
        $("#results").append('<table><tr><th>Name:&nbsp'+j.trackCensoredName+'</th></tr><tr><th><img src="'+j.artworkUrl60+'" align="left"/></th></tr></table>'+'<BR>Link:&nbsp'+j.trackViewUrl+'<BR>Icon:&nbsp'+j.artworkUrl60+'<BR>AppID:&nbsp'+j.bundleId+'<HR>');
      });
    });
  });
});
</script>
<hr />
